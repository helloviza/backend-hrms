version: 1.0
runtime: nodejs20
build:
  commands:
    pre-build:
      - npm install -g pnpm
    build:
      - pnpm install --filter "@plumtrips/hrms-backend..." --frozen-lockfile
      - pnpm --filter "@plumtrips/hrms-backend" build
run:
  command: node dist/server.js
  network:
    port: 8080
    env: PORT
